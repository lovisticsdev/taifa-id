name: taifa-id

services:
  postgres:
    image: postgres:latest
    container_name: taifa-id-postgres
    environment:
      POSTGRES_DB: taifa_id
      POSTGRES_USER: taifa
      POSTGRES_PASSWORD: taifa_dev_password
    ports:
      - "5432:5432"
    volumes:
      - taifa_id_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taifa -d taifa_id"]
      interval: 5s
      timeout: 5s
      retries: 20

  taifa-id:
    profiles:
      - app
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taifa-id-api
    environment:
      TAIFA_ID_SERVICE_NAME: taifa-id
      TAIFA_ID_ENV: local
      TAIFA_ID_HTTP_ADDR: ":8080"
      TAIFA_ID_DATABASE_DSN: "host=postgres port=5432 user=taifa password=taifa_dev_password dbname=taifa_id sslmode=disable"
      TAIFA_ID_DATABASE_CONNECT_TIMEOUT: "15s"
      TAIFA_ID_JWT_SECRET: "replace-this-with-a-long-local-dev-secret-at-least-32-chars"
      TAIFA_ID_JWT_ISSUER: "taifa-id"
      TAIFA_ID_JWT_AUDIENCE: "taifa-republic"
      TAIFA_ID_JWT_TTL: "1h"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  taifa_id_postgres_data: